services:
  mysql:
    image: mysql:8.0
    container_name: agent_eval_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agent_eval
      MYSQL_USER: agent
      MYSQL_PASSWORD: agent123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: agent_eval_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: agent_eval_mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_ADVANCED: ${INSTALL_ADVANCED:-false}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-http://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}

    image: agent_eval_backend:latest
    pull_policy: never

    container_name: agent_eval_backend

    restart: unless-stopped

    environment:
      APP_NAME: agent-eval-platform
      ENV: dev
      API_PREFIX: /api/v1

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agent_eval
      MYSQL_USER: agent
      MYSQL_PASSWORD: agent123

      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: agent_eval

      REDIS_URL: redis://redis:6379/0

      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      CORS_ORIGINS: http://localhost:8081,http://localhost:4173

      USE_CELERY: "true"
      RAGAS_ENABLED: "false"

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}

      LLM_JUDGE_MODEL: ${LLM_JUDGE_MODEL:-gpt-4o-mini}

      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_LLM_MODEL: ${DEEPSEEK_LLM_MODEL:-deepseek-chat}

    depends_on:
      mysql:
        condition: service_healthy

      redis:
        condition: service_started

      mongo:
        condition: service_started

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

    volumes:
      - ./backend:/app

    networks:
      default:
        aliases:
          - backend

  worker:
    image: agent_eval_backend:latest
    pull_policy: never

    container_name: agent_eval_worker

    command: celery -A app.core.celery_app.celery_app worker --loglevel=info

    restart: unless-stopped

    environment:
      APP_NAME: agent-eval-platform
      ENV: dev
      API_PREFIX: /api/v1

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agent_eval
      MYSQL_USER: agent
      MYSQL_PASSWORD: agent123

      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: agent_eval

      REDIS_URL: redis://redis:6379/0

      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      CORS_ORIGINS: http://localhost:8081,http://localhost:4173

      USE_CELERY: "true"
      RAGAS_ENABLED: "false"

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}

      LLM_JUDGE_MODEL: ${LLM_JUDGE_MODEL:-gpt-4o-mini}

      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_LLM_MODEL: ${DEEPSEEK_LLM_MODEL:-deepseek-chat}

    depends_on:
      - backend

    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: agent_eval_frontend

    restart: unless-stopped

    ports:
      - "4173:4173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine

    container_name: agent_eval_nginx

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

    ports:
      - "8081:80"

    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
  mongo_data:
