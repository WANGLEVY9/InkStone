security-audit:
  stage: test
  image: python:3.11-slim
  cache: *cache_pip
  allow_failure: true
  dependencies: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - pip install pip-audit==2.7.3
    - pip-audit -r backend/requirements.txt || true

backend-image-build:
  stage: package
  image: docker:24.0.5
  dependencies: []
  needs:
    - backend-build
  services:
    - name: docker:24.0.5-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if:
        '$ENABLE_IMAGE_BUILD == "true" && $IMAGE_REGISTRY && $IMAGE_REGISTRY_USER
        && $IMAGE_REGISTRY_PASSWORD && $IMAGE_REPOSITORY && $CI_COMMIT_BRANCH ==
        $CI_DEFAULT_BRANCH'
    - if:
        '$ENABLE_IMAGE_BUILD == "true" && $IMAGE_REGISTRY && $IMAGE_REGISTRY_USER
        && $IMAGE_REGISTRY_PASSWORD && $IMAGE_REPOSITORY && $CI_COMMIT_TAG'
    - when: never
  script:
    - echo "$IMAGE_REGISTRY_PASSWORD" | docker login -u "$IMAGE_REGISTRY_USER"
      --password-stdin "$IMAGE_REGISTRY"
    - docker build -t "$IMAGE_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA" backend
    - docker push "$IMAGE_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA" "$IMAGE_REPOSITORY/backend:latest"
        docker push "$IMAGE_REPOSITORY/backend:latest"
      fi

