deploy-staging:
  stage: deploy
  image: alpine:3.20
  environment:
    name: staging
  rules:
    - if:
        '$ENABLE_IMAGE_BUILD == "true" && $IMAGE_REPOSITORY && $CI_COMMIT_BRANCH
        == $CI_DEFAULT_BRANCH'
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$STAGING_DEPLOY_SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - echo "$STAGING_DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - chmod +x deploy/scripts/remote_deploy.sh
  script:
    - export DEPLOY_HOST="$STAGING_DEPLOY_HOST"
    - export DEPLOY_USER="$STAGING_DEPLOY_USER"
    - export DEPLOY_PORT="${STAGING_DEPLOY_PORT:-22}"
    - export DEPLOY_PATH="$STAGING_DEPLOY_PATH"
    - export
      DEPLOY_COMPOSE_FILE="${STAGING_DEPLOY_COMPOSE_FILE:-docker-compose.yml}"
    - export BACKEND_IMAGE="$IMAGE_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA"
    - export FRONTEND_IMAGE="$IMAGE_REPOSITORY/frontend:$CI_COMMIT_SHORT_SHA"
    - sh deploy/scripts/remote_deploy.sh

smoke-staging:
  stage: deploy
  image: curlimages/curl:8.11.1
  needs:
    - deploy-staging
  rules:
    - if: '$ENABLE_IMAGE_BUILD == "true" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  script:
    - test -n "$STAGING_HEALTHCHECK_URL"
    - curl -fsS "$STAGING_HEALTHCHECK_URL"

deploy-production:
  stage: deploy
  image: alpine:3.20
  environment:
    name: production
  rules:
    - if: '$ENABLE_IMAGE_BUILD == "true" && $IMAGE_REPOSITORY && $CI_COMMIT_TAG'
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$PROD_DEPLOY_SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - echo "$PROD_DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - chmod +x deploy/scripts/remote_deploy.sh
  script:
    - export DEPLOY_HOST="$PROD_DEPLOY_HOST"
    - export DEPLOY_USER="$PROD_DEPLOY_USER"
    - export DEPLOY_PORT="${PROD_DEPLOY_PORT:-22}"
    - export DEPLOY_PATH="$PROD_DEPLOY_PATH"
    - export
      DEPLOY_COMPOSE_FILE="${PROD_DEPLOY_COMPOSE_FILE:-docker-compose.yml}"
    - export BACKEND_IMAGE="$IMAGE_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA"
    - export FRONTEND_IMAGE="$IMAGE_REPOSITORY/frontend:$CI_COMMIT_SHORT_SHA"
    - sh deploy/scripts/remote_deploy.sh

deploy-local:
  stage: deploy
  tags:
    - deploy-shell
  dependencies: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - cd /opt/deploy/task2
    - git checkout -- .
    - git pull "$CI_REPOSITORY_URL" master
    - docker compose up -d --build
    - docker system prune -f --filter "until=24h" || true
