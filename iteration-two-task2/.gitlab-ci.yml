backend-taskflow-smoke:
  stage: integration
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-build
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - pip install -r requirements.txt
    - export DATABASE_URL="sqlite:///./ci_flow.db"
    - export USE_CELERY="false"
    - export RAGAS_ENABLED="false"
    - |
      python - <<'PY'
      from app.core.database import engine
      from app.models import Base
      from fastapi.testclient import TestClient
      from app.main import app

      Base.metadata.create_all(bind=engine)

      payload = {
          "name": "ci-taskflow-smoke",
          "agent_version": "v1",
          "dataset_id": "ci_ds",
          "mode": "result",
          "method": "fuzzy",
          "dimension": "effectiveness",
          "config": {
              "metrics": ["response_time", "task_success", "answer_relevancy"],
              "strategy": "default",
          },
          "input_payload": {
              "question": "what is rag",
              "answer": "rag is retrieval augmented generation",
              "ground_truth": "retrieval-augmented generation",
              "contexts": ["retrieval + generation"],
              "response_time_ms": 200,
              "token_usage": 120,
              "task_success": True,
              "tool_calls_total": 2,
              "tool_calls_success": 2,
          },
      }

      client = TestClient(app)
      create_resp = client.post('/api/v1/tasks/', json=payload)
      assert create_resp.status_code == 200, create_resp.text
      tid = create_resp.json()['id']

      run_resp = client.post(f'/api/v1/tasks/{tid}/execute')
      assert run_resp.status_code == 200, run_resp.text

      result_resp = client.get(f'/api/v1/results/task/{tid}')
      assert result_resp.status_code == 200, result_resp.text
      assert isinstance(result_resp.json(), list)

      cmp_resp = client.post('/api/v1/results/compare', json={"task_ids": [tid]})
      assert cmp_resp.status_code == 200, cmp_resp.text
      PY

backend-mode-eval-smoke:
  stage: integration
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-build
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - pip install -r requirements.txt
    - export DATABASE_URL="sqlite:///./ci_mode.db"
    - export USE_CELERY="false"
    - export RAGAS_ENABLED="false"
    - |
      python - <<'PY'
      from app.core.database import engine
      from app.models import Base
      from fastapi.testclient import TestClient
      from app.main import app

      Base.metadata.create_all(bind=engine)

      client = TestClient(app)

      rt = client.post('/api/v1/mode-realtime/sessions/start', json={"agent_name": "ci-agent", "task": "ci-task"})
      assert rt.status_code == 200, rt.text
      sid = rt.json()['session_id']

      st = client.post(f'/api/v1/mode-realtime/sessions/{sid}/step-start', json={"step": 1, "action": "query_order"})
      assert st.status_code == 200, st.text

      tc = client.post(f'/api/v1/mode-realtime/sessions/{sid}/tool-call', json={"tool_name": "query_order", "dangerous": False})
      assert tc.status_code == 200, tc.text

      ev = client.post(
          f'/api/v1/mode-realtime/sessions/{sid}/events',
          json={
            "event_type": "node_execution",
            "node": "supervisor",
            "agent_type": "supervisor",
            "step": 1,
            "message": "route to worker",
            "next_agent": "writer-agent",
            "tool_calls": [{"name": "outline_search", "params": {"chapter": 1}, "dangerous": False}],
            "state": {"chapter": 1},
            "duration_sec": 0.6,
            "source": "langgraph-stream",
          },
      )
      assert ev.status_code == 200, ev.text
      assert ev.json().get("decision") in {"CONTINUE", "STOP", "BLOCK", "TIMEOUT"}

      se = client.post(f'/api/v1/mode-realtime/sessions/{sid}/step-end', json={"step": 1, "duration_sec": 1.3})
      assert se.status_code == 200, se.text

      end = client.post(f'/api/v1/mode-realtime/sessions/{sid}/end')
      assert end.status_code == 200, end.text

      trace_payload = {
          "trace": {
              "session_id": "ci_trace_01",
              "task": "query order",
              "steps": [
                  {
                      "step": 1,
                      "thought": "query order first",
                      "action": {"tool": "query_order", "params": {}},
                      "result": "ok",
                      "duration": 1.1,
                  }
              ],
              "final_result": "ok",
              "success": True,
          }
      }

      off = client.post('/api/v1/mode-offline/jobs/submit', json=trace_payload)
      assert off.status_code == 200, off.text

      dataset_payload = '{"samples":[{"session_id":"d1","task":"batch","result":"ok","success":true}]}'
      up = client.post('/api/v1/datasets/upload', files={"file": ("mode_batch.json", dataset_payload, "application/json")})
      assert up.status_code == 200, up.text
      dataset_id = up.json()['dataset']['dataset_id']

      batch = client.post('/api/v1/mode-batch/jobs/run', json={"dataset_id": dataset_id})
      assert batch.status_code == 200, batch.text
      PY

backend-mysql-seeded-e2e:
  stage: integration
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-build
    - sql-snapshot-sync-check
  services:
    - name: mysql:8.0
      alias: mysql
    - name: mongo:7
      alias: mongo
  variables:
    DEBIAN_FRONTEND: "noninteractive"
    MYSQL_DATABASE: "$CI_MYSQL_DB"
    MYSQL_ROOT_PASSWORD: "$CI_MYSQL_ROOT_PASSWORD"
    MYSQL_ROOT_HOST: "%"
    MYSQL_USER: "$CI_MYSQL_USER"
    MYSQL_PASSWORD: "$CI_MYSQL_PASSWORD"
  rules:
    - changes:
        - backend/**/*
        - deploy/sql/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - apt-get update && apt-get install -y --no-install-recommends
      default-mysql-client && rm -rf /var/lib/apt/lists/*
    - cd backend
    - pip install -r requirements.txt
    - export MYSQL_HOST="$CI_MYSQL_HOST"
    - export MYSQL_PORT="$CI_MYSQL_PORT"
    - export MYSQL_DB="$CI_MYSQL_DB"
    - export MYSQL_USER="$CI_MYSQL_USER"
    - export MYSQL_PASSWORD="$CI_MYSQL_PASSWORD"
    - export MONGO_URI="$CI_MONGO_URI"
    - export MONGO_DB="$CI_MONGO_DB"
    - export USE_CELERY="false"
    - export RAGAS_ENABLED="false"
    - export
      DATABASE_URL="mysql+pymysql://${CI_MYSQL_USER}:${CI_MYSQL_PASSWORD}@${CI_MYSQL_HOST}:${CI_MYSQL_PORT}/${CI_MYSQL_DB}?charset=utf8mb4"
    - |
      python - <<'PY'
      import os
      import socket
      import sys
      import time

      host = os.environ["CI_MYSQL_HOST"]
      port = int(os.environ["CI_MYSQL_PORT"])

      print(f"Resolving {host}:{port} ...")
      try:
          infos = socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
      except Exception as exc:  # pragma: no cover
          raise SystemExit(f"MySQL host resolve failed: {exc}")

      addrs = sorted({info[4][0] for info in infos})
      print("Resolved addresses:", ", ".join(addrs))

      for i in range(1, 121):
          try:
              with socket.create_connection((host, port), timeout=2):
                  print(f"MySQL TCP is reachable after {i} attempts")
                  break
          except OSError as exc:
              if i in {1, 10, 20, 30, 60, 90, 120}:
                  print(f"Attempt {i}: waiting for MySQL TCP ({exc})")
              time.sleep(2)
      else:
          raise SystemExit("MySQL TCP port did not become reachable in time")
      PY
    - |
      last_error=""
      for i in $(seq 1 60); do
        if mysql -h"$CI_MYSQL_HOST" -P"$CI_MYSQL_PORT" -u"$CI_MYSQL_USER" -p"$CI_MYSQL_PASSWORD" --protocol=tcp --skip-ssl "$CI_MYSQL_DB" -e "SELECT 1" >/dev/null 2>&1; then
          echo "MySQL auth/database is ready after ${i} attempts"
          break
        fi

        last_error="$(mysql -h"$CI_MYSQL_HOST" -P"$CI_MYSQL_PORT" -u"$CI_MYSQL_USER" -p"$CI_MYSQL_PASSWORD" --protocol=tcp --skip-ssl "$CI_MYSQL_DB" -e "SELECT 1" 2>&1 >/dev/null || true)"
        if [ "$i" = "1" ] || [ "$i" = "10" ] || [ "$i" = "20" ] || [ "$i" = "30" ] || [ "$i" = "45" ]; then
          echo "[diag] app auth attempt ${i} failed: ${last_error}"
        fi

        if [ "$i" -eq 60 ]; then
          echo "MySQL port is reachable but app user/database is not ready. Trying root bootstrap once..."
          mysql -h"$CI_MYSQL_HOST" -P"$CI_MYSQL_PORT" -uroot -p"$CI_MYSQL_ROOT_PASSWORD" --protocol=tcp --skip-ssl -e "CREATE DATABASE IF NOT EXISTS ${CI_MYSQL_DB} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE USER IF NOT EXISTS '${CI_MYSQL_USER}'@'%' IDENTIFIED BY '${CI_MYSQL_PASSWORD}'; GRANT ALL PRIVILEGES ON ${CI_MYSQL_DB}.* TO '${CI_MYSQL_USER}'@'%'; FLUSH PRIVILEGES;" || true
          if ! mysql -h"$CI_MYSQL_HOST" -P"$CI_MYSQL_PORT" -u"$CI_MYSQL_USER" -p"$CI_MYSQL_PASSWORD" --protocol=tcp --skip-ssl "$CI_MYSQL_DB" -e "SELECT 1" >/dev/null 2>&1; then
            echo "MySQL bootstrap failed. app user/database still unavailable."
            echo "[diag] host=${CI_MYSQL_HOST} port=${CI_MYSQL_PORT} db=${CI_MYSQL_DB} user=${CI_MYSQL_USER}"
            echo "[diag] last app auth error: ${last_error}"
            exit 1
          fi
          echo "MySQL auth/database became ready after root bootstrap"
          break
        fi

        sleep 2
      done
    - |
      python - <<'PY'
      import os
      os.environ["PYTHONWARNINGS"] = "ignore"

      from app.core.config import get_settings
      get_settings.cache_clear()

      from app.core.database import engine
      from app.models import Base

      Base.metadata.create_all(bind=engine)
      print("metadata create_all done")
      PY
    - test -s "$CI_PROJECT_DIR/$SQL_SNAPSHOT_FILE"
    - mysql -h"$CI_MYSQL_HOST" -P"$CI_MYSQL_PORT" -u"$CI_MYSQL_USER"
      -p"$CI_MYSQL_PASSWORD" --protocol=tcp --skip-ssl "$CI_MYSQL_DB" <
      "$CI_PROJECT_DIR/$SQL_SNAPSHOT_FILE"
    - |
      python - <<'PY'
      from fastapi.testclient import TestClient

      from app.core.config import get_settings
      get_settings.cache_clear()

      from app.main import app

      client = TestClient(app)

      health = client.get('/api/v1/health/')
      assert health.status_code == 200, health.text
      health_json = health.json()
      assert health_json['database']['mysql'] == 'up', health_json

      metrics = client.get('/api/v1/metrics/')
      assert metrics.status_code == 200, metrics.text
      assert len(metrics.json()) >= 1, "seeded metrics should not be empty"

      strategies = client.get('/api/v1/strategies/')
      assert strategies.status_code == 200, strategies.text
      assert len(strategies.json()) >= 1, "seeded strategies should not be empty"

      payload = {
          "name": "mysql-seeded-ci-task",
          "agent_version": "v1",
          "dataset_id": "ci_ds_mysql",
          "mode": "result",
          "method": "fuzzy",
          "dimension": "effectiveness",
          "config": {
              "metrics": ["response_time", "token_usage", "task_success"],
              "strategy": "default",
              "enable_process_trace": True,
          },
          "input_payload": {
              "question": "what is rag",
              "answer": "retrieval augmented generation",
              "ground_truth": "retrieval-augmented generation",
              "contexts": ["rag combines retrieval and generation"],
              "response_time_ms": 220,
              "token_usage": 140,
              "task_success": True,
              "tool_calls_total": 2,
              "tool_calls_success": 2,
          },
      }

      create_resp = client.post('/api/v1/tasks/', json=payload)
      assert create_resp.status_code == 200, create_resp.text
      task_id = create_resp.json()['id']

      exec_resp = client.post(f'/api/v1/tasks/{task_id}/execute')
      assert exec_resp.status_code == 200, exec_resp.text

      result_resp = client.get(f'/api/v1/results/task/{task_id}')
      assert result_resp.status_code == 200, result_resp.text
      assert isinstance(result_resp.json(), list)
      PY

frontend-artifact-check:
  stage: integration
  image: node:20-alpine
  needs:
    - job: frontend-build
      artifacts: true
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - test -f frontend/dist/index.html
    - test -s frontend/dist/index.html

backend-report:
  stage: report
  image: python:3.11-slim
  needs:
    - job: backend-build
      artifacts: true
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - |
      python - <<'PY'
      import json
      from pathlib import Path

      schema = json.loads(Path('backend/openapi.json').read_text(encoding='utf-8'))
      paths = schema.get('paths', {})
      print(f'OpenAPI paths: {len(paths)}')
      print('Sample paths:', ', '.join(sorted(paths.keys())[:10]))
      PY

