include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - precheck
  - validate
  - test
  - verify
  - build
  - integration
  - report
  - package
  - deploy

default:
  interruptible: true
  retry: 1

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_ROOT_USER_ACTION: "ignore"
  PIP_NO_COLOR: "1"
  SQL_SNAPSHOT_FILE: "deploy/sql/local_seed.sql"
  CI_MYSQL_HOST: "mysql"
  CI_MYSQL_PORT: "3306"
  CI_MYSQL_DB: "agent_eval"
  CI_MYSQL_USER: "agent"
  CI_MYSQL_PASSWORD: "agent123"
  CI_MYSQL_ROOT_PASSWORD: "root123"
  CI_MONGO_URI: "mongodb://mongo:27017"
  CI_MONGO_DB: "agent_eval"
  ENABLE_IMAGE_BUILD: "false"
  IMAGE_REGISTRY: "$CI_REGISTRY"
  IMAGE_REGISTRY_USER: "$CI_REGISTRY_USER"
  IMAGE_REGISTRY_PASSWORD: "$CI_REGISTRY_PASSWORD"
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE"

.cache-node: &cache_node
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/node_modules/
  policy: pull-push

.cache-pip: &cache_pip
  key:
    files:
      - backend/requirements.txt
  paths:
    - .cache/pip
  policy: pull-push

ci-config-sanity:
  stage: precheck
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: "$CI_COMMIT_TAG"
  script:
    - pip install pyyaml==6.0.2
    - |
      python - <<'PY'
      import yaml
      from pathlib import Path

      ci = yaml.safe_load(Path('.gitlab-ci.yml').read_text(encoding='utf-8'))
      stages = ci.get('stages', [])
      assert isinstance(stages, list) and len(stages) >= 6, f'invalid stages: {stages}'
      print('CI stages:', stages)
      PY

compose-config-sanity:
  stage: precheck
  image: python:3.11-slim
  dependencies: []
  rules:
    - changes:
        - docker-compose.yml
        - deploy/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - pip install pyyaml==6.0.2
    - |
      python - <<'PY'
      import yaml
      from pathlib import Path

      compose_file = Path('docker-compose.yml')
      if not compose_file.exists():
          raise SystemExit('docker-compose.yml not found')

      data = yaml.safe_load(compose_file.read_text(encoding='utf-8')) or {}
      services = data.get('services', {})
      if not isinstance(services, dict) or not services:
          raise SystemExit('docker-compose services is empty or invalid')

      required = {'backend', 'frontend', 'mysql', 'redis', 'mongo', 'nginx'}
      missing = required - set(services.keys())
      if missing:
          raise SystemExit(f'missing required compose services: {sorted(missing)}')

      print('compose services:', sorted(services.keys()))
      PY

sql-snapshot-sync-check:
  stage: precheck
  image: alpine:3.20
  dependencies: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: "$CI_COMMIT_TAG"
  before_script:
    - apk add --no-cache git
  script:
    - test -s "$SQL_SNAPSHOT_FILE"
    - |
      if [ -n "${CI_COMMIT_BEFORE_SHA:-}" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        CHANGED_FILES="$(git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA")"
      else
        CHANGED_FILES="$(git show --pretty='' --name-only "$CI_COMMIT_SHA")"
      fi

      echo "Changed files:"
      echo "$CHANGED_FILES"

      if echo "$CHANGED_FILES" | grep -Eq '^backend/app/models/'; then
        if ! echo "$CHANGED_FILES" | grep -Fxq "$SQL_SNAPSHOT_FILE"; then
          echo "Detected model changes but SQL snapshot was not updated."
          echo "Please export local MySQL seed data and commit $SQL_SNAPSHOT_FILE together with model changes."
          exit 1
        fi
      fi

    - sha256sum "$SQL_SNAPSHOT_FILE"

frontend-quality:
  stage: validate
  image: node:20-alpine
  cache: *cache_node
  dependencies: []
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd frontend
    - npm config set registry https://registry.npmmirror.com
    - if [ -f package-lock.json ]; then npm ci; else npm install; fi
    - npm run build

backend-quality:
  stage: validate
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - python -V
    - pip install -r requirements.txt -r requirements-dev.txt
    - python -m compileall app tests
    - pip install ruff==0.6.9
    - ruff check app tests --output-format=gitlab --quiet || true

backend-test:
  stage: test
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-quality
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest-cov
    - pytest -q --maxfail=1 --junitxml=../reports/backend-junit.xml --cov=app
      --cov-report=xml:../reports/backend-coverage.xml
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/backend-junit.xml
      - reports/backend-coverage.xml
    reports:
      junit: reports/backend-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: reports/backend-coverage.xml
  coverage: "/TOTAL\\s+\\d+\\s+\\d+\\s+(\\d+%)/"

