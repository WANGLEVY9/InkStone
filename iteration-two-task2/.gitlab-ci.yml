backend-model-schema-check:
  stage: verify
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-quality
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - pip install -r requirements.txt
    - export DATABASE_URL="sqlite:///./ci_schema.db"
    - export USE_CELERY="false"
    - export RAGAS_ENABLED="false"
    - |
      python - <<'PY'
      from app.core.config import get_settings
      get_settings.cache_clear()

      from app.core.database import engine
      from app.models import Base

      Base.metadata.create_all(bind=engine)
      table_names = set(Base.metadata.tables.keys())
      expected = {
          "evaluation_tasks",
          "evaluation_results",
          "metric_definitions",
          "evaluation_strategies",
          "dataset_assets",
          "agents",
          "agent_versions",
          "metric_templates",
      }
      missing = expected - table_names
      if missing:
          raise SystemExit(f"Missing tables in metadata: {sorted(missing)}")

      task_columns = set(Base.metadata.tables["evaluation_tasks"].columns.keys())
      required_task_cols = {"id", "name", "status", "config", "input_payload", "metrics", "note"}
      if not required_task_cols.issubset(task_columns):
          raise SystemExit("evaluation_tasks table missing required columns")

      print("schema check passed")
      PY

backend-contract-check:
  stage: verify
  image: python:3.11-slim
  cache: *cache_pip
  dependencies: []
  needs:
    - backend-quality
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd backend
    - pip install -r requirements.txt
    - export DATABASE_URL="sqlite:///./ci_contract.db"
    - export USE_CELERY="false"
    - export RAGAS_ENABLED="false"
    - |
      python - <<'PY'
      from app.main import app

      schema = app.openapi()
      required_paths = [
          "/api/v1/health/",
          "/api/v1/tasks/",
          "/api/v1/tasks/compare",
          "/api/v1/metrics/",
          "/api/v1/strategies/",
          "/api/v1/datasets/upload",
          "/api/v1/agents/",
          "/api/v1/metrics/templates/",
          "/api/v1/demo/seed",
          "/api/v1/mode-realtime/sessions/start",
          "/api/v1/mode-realtime/sessions/{session_id}/events",
          "/api/v1/mode-offline/jobs/submit",
          "/api/v1/mode-batch/jobs/run",
      ]
      missing_paths = [p for p in required_paths if p not in schema.get("paths", {})]
      if missing_paths:
          raise SystemExit(f"Missing OpenAPI paths: {missing_paths}")

      schemas = schema.get("components", {}).get("schemas", {})
      required_schemas = [
          "TaskRead", "ResultRead", "MetricRead",
          "OfflineEvalJobRead", "DatasetBatchJobRead",
          "AgentRead", "MetricTemplateRead",
      ]
      missing_schemas = [name for name in required_schemas if name not in schemas]
      if missing_schemas:
          raise SystemExit(f"Missing OpenAPI schemas: {missing_schemas}")

      print("openapi contract check passed")
      PY

frontend-dependency-audit:
  stage: verify
  image: node:20-alpine
  cache: *cache_node
  dependencies: []
  allow_failure: true
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd frontend
    - npm config set registry https://registry.npmmirror.com
    - if [ -f package-lock.json ]; then npm ci; else npm install; fi
    - |
      set +e
      npm audit --registry=https://registry.npmjs.org --omit=dev --audit-level=high
      rc=$?
      set -e
      if [ $rc -ne 0 ]; then
        echo "[audit] high/critical vulnerabilities found (non-blocking)."
      else
        echo "[audit] no high/critical vulnerabilities detected."
      fi

